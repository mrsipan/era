name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            artifact: era-linux-amd64
          - os: macos-latest
            name: darwin-arm64
            artifact: era-darwin-arm64
          - os: macos-13
            name: darwin-amd64
            artifact: era-darwin-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsodium pkg-config

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DSTATIC_LINK=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Verify
        run: |
          file build/era
          ./build/era --version

      - name: Strip
        run: strip build/era

      - name: Package
        run: |
          cp build/era era
          tar -czf ${{ matrix.artifact }}.tar.gz era

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz
